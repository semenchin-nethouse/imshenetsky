<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека Имшенецкого Дениса</title>
<meta name="description" content="Спасибо, что пользуетесь библиотекой Имшенецкого Дениса.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,600;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:   #0A1410;
  --ink:  #D0E0D0;
  --gold: #98B870;
  --dim:  #407050;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Cormorant', serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Угловые метки ── */
.corner {
  position: fixed;
  width: 28px; height: 28px;
  z-index: 10;
  opacity: 0;
  animation: fadeIn 0.6s 1.1s ease forwards;
}
.corner--tl { top: 28px; left: 28px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner--tr { top: 28px; right: 28px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
.corner--bl { bottom: 28px; left: 28px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner--br { bottom: 28px; right: 28px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

/* ── Верх и низ ── */
.edge-label {
  position: fixed;
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
  z-index: 10;
  opacity: 0;
  animation: fadeIn 0.6s 1.1s ease forwards;
}
.edge-label--top    { top: 36px; }
.edge-label--bottom { bottom: 36px; }

@keyframes fadeIn { to { opacity: 1; } }
@keyframes riseIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Контейнер ── */
main.wrap {
  width: min(600px, calc(100vw - 64px));
  position: relative;
  z-index: 2;
  text-align: center;
}

/* ── Главный текст ── */
.statement {
  font-family: 'Cormorant', serif;
  font-size: clamp(48px, 9vw, 86px);
  font-weight: 600;
  line-height: 1.05;
  color: var(--ink);
  letter-spacing: -0.01em;
  opacity: 0;
  animation: riseIn 1s 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
  margin-bottom: 40px;
}

/* ── Разделитель ── */
.divider {
  width: 36px;
  height: 1px;
  background: var(--gold);
  opacity: 0;
  margin: 0 auto 40px;
  animation: fadeIn 0.6s 0.5s ease forwards;
}

/* ── Подтекст ── */
.subtext {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: clamp(20px, 4vw, 34px);
  font-weight: 300;
  line-height: 1.55;
  color: var(--ink);
  opacity: 0;
  animation: fadeIn 0.8s 0.55s ease forwards;
}

/* ── Фокус ── */
a:focus-visible {
  outline: 1px solid var(--gold);
  outline-offset: 3px;
}

/* ── Мобильный ── */
@media (max-width: 600px) {
  body { align-items: stretch; }

  .corner { width: 20px; height: 20px; }
  .corner--tl { top: 20px; left: 20px; }
  .corner--tr { top: 20px; right: 20px; }
  .corner--bl { bottom: 20px; left: 20px; }
  .corner--br { bottom: 20px; right: 20px; }

  .edge-label { font-size: 9px; letter-spacing: 0.2em; }
  .edge-label--top    { top: 24px; }
  .edge-label--bottom { bottom: 24px; }

  main.wrap {
    width: auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 32px;
    text-align: left;
  }

  .divider { margin-left: 0; }
}
</style>
</head>
<body>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="edge-label edge-label--top">Imshenetsky.com</div>
<div class="edge-label edge-label--bottom">Россия · Санкт-Петербург</div>

<main class="wrap">
  <h1 class="statement">Приятного чтения!</h1>

  <div class="divider" aria-hidden="true"></div>

  <p class="subtext">
    Спасибо, что пользуетесь<br>
    моей библиотекой.<br>
    Пожалуйста, после прочтения<br>
    возвращайте книгу обратно.
  </p>
</main>

</body>
</html>
